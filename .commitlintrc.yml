#yaml-lanaguage-server: $schema="https://json.schemastore.org/commitlintrc.json"
extends:
  - "@commitlint/config-conventional"
rules:
  scope-enum: [2, "always", ["services", "task", "readme"]]
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - test
      - chore
      - revert
