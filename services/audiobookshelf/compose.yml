services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.34.0
    container_name: audiobookshelf
    user: "${UID}:${GID}"
    ports:
      - "${ABS_PORT}:80"
    volumes:
      - "${MEDIA_ROOT}/Library/Books:/books"
      - "${MEDIA_ROOT}/Library/Audiobooks:/audiobooks"
      - "${MEDIA_ROOT}/Library/Comics:/comics"
      - "${APPDATA_ROOT}/audiobookshelf/config:/config"
      - "${APPDATA_ROOT}/audiobookshelf/metadata:/metadata"
    environment:
      TZ: ${TZ}
    restart: unless-stopped
